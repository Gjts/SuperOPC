title: "[Idea] "
labels:
  - idea
body:
  - type: markdown
    attributes:
      value: |
        Share your idea for SuperOPC! We love hearing from solo founders.
        分享你对 SuperOPC 的想法！我们喜欢听到独立创始人的声音。
  - type: textarea
    id: idea
    attributes:
      label: "Describe your idea / 描述你的想法"
      description: "What would you like to see in SuperOPC?"
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: "Use case / 使用场景"
      description: "How would you use this in your one-person company?"
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: "Category / 类别"
      options:
        - Skill (技能)
        - Agent (代理)
        - Command (命令)
        - Template (模板)
        - Integration (集成)
        - Documentation (文档)
        - Other (其他)
    validations:
      required: true
