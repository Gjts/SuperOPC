name: Quality

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Run pytest
        run: python -m pytest tests/test_session_workflow.py tests/test_engine_v2.py -v

      - name: Run repo health check
        run: python scripts/opc_health.py --cwd . --target repo --json

      - name: Run converter smoke test
        run: python scripts/convert.py --tool all --out ./tmp-integrations
