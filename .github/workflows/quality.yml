name: Quality

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest and yaml
        run: python -m pip install --upgrade pip pytest pyyaml jsonschema

      - name: Verify command contract (skill-first / agent-workflow)
        run: python scripts/verify_command_contract.py

      - name: Verify skill registry sync
        run: python scripts/build_skill_registry.py --check

      - name: Run pytest (full suite)
        # v1.4.2 audit: previously only ran 3 test files. Now runs all tests/
        # including test_quality_system.py, test_build_skill_registry.py,
        # test_intent_router.py, and test_opc_routing_stats.py which were
        # previously not covered in CI.
        run: python scripts/run_pytest.py tests/ -v

      - name: Run repo health check
        run: python scripts/opc_health.py --cwd . --target repo --json

      - name: Run converter smoke test
        run: python scripts/convert.py --tool all --out ./tmp-integrations
