name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Verify quality gates
        run: |
          python -m pytest tests/test_session_workflow.py
          python scripts/opc_health.py --cwd . --target repo --json

      - name: Generate integrations
        run: python scripts/convert.py --tool all

      - name: Package release artifact
        run: python -m zipfile -c superopc-release.zip .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: superopc-release.zip
